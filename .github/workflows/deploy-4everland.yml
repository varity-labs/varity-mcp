name: Deploy to 4everland

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: varity-labs/varity-mcp

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix={{branch}}-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to 4everland
        env:
          FOUREVERLAND_API_KEY: ${{ secrets.FOUREVERLAND_API_KEY }}
        run: |
          echo "Triggering 4everland deployment..."
          # 4everland will pull the latest image from GHCR
          curl -X POST "https://api.4everland.org/v1/deployments" \
            -H "Authorization: Bearer $FOUREVERLAND_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "varity-mcp",
              "image": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest",
              "port": 3100,
              "env": {
                "NODE_ENV": "production",
                "VARITY_AUTH_URL": "https://auth.varity.so",
                "VARITY_GATEWAY_URL": "https://varity.app"
              }
            }'

      - name: Health check
        run: |
          echo "Waiting for deployment..."
          sleep 30
          curl -f https://mcp.varity.so/health || echo "Health check failed - deployment may still be rolling out"
